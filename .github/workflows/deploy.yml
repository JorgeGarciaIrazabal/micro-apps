name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build every app under apps/ (dynamic — no per-app steps to maintain)
      - name: Install & build all apps
        run: |
          set -e
          for app in apps/*/; do
            name=$(basename "$app")
            echo "=========================================="
            echo "Building $name"
            echo "=========================================="
            (cd "$app" && npm ci && npm run build)
          done

      # Assemble final site: landing page assets + registry + houses + each app's dist
      - name: Assemble site
        run: |
          set -e
          mkdir -p _site
          cp index.html style.css script.js _site/
          [ -f registry.json ] && cp registry.json _site/ || true
          [ -d houses ] && cp -r houses _site/houses || true
          for app in apps/*/; do
            name=$(basename "$app")
            mkdir -p "_site/$name"
            cp -r "$app/dist/." "_site/$name/"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.attempt5.outputs.page_url || steps.attempt4.outputs.page_url || steps.attempt3.outputs.page_url || steps.attempt2.outputs.page_url || steps.attempt1.outputs.page_url }}
    steps:
      # actions/deploy-pages@v4 intermittently fails with "Deployment failed, try
      # again later" on the GitHub Pages backend's first status poll — a transient
      # infra glitch that succeeds on retry. So we attempt up to 5 times, each
      # gated on the previous attempt's outcome, with a short backoff between
      # attempts to let the Pages backend recover.
      - id: attempt1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff 2
        if: steps.attempt1.outcome == 'failure'
        run: sleep 20
      - id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff 3
        if: steps.attempt2.outcome == 'failure'
        run: sleep 30
      - id: attempt3
        if: steps.attempt2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff 4
        if: steps.attempt3.outcome == 'failure'
        run: sleep 30
      - id: attempt4
        if: steps.attempt3.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff 5
        if: steps.attempt4.outcome == 'failure'
        run: sleep 30
      - id: attempt5
        if: steps.attempt4.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Fail if every attempt failed
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure' && steps.attempt3.outcome == 'failure' && steps.attempt4.outcome == 'failure' && steps.attempt5.outcome == 'failure'
        run: |
          echo "::error::All 5 GitHub Pages deployment attempts failed."
          exit 1
