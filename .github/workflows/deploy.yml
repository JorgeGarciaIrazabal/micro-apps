name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build every app under apps/ (dynamic — no per-app steps to maintain)
      - name: Install & build all apps
        run: |
          set -e
          for app in apps/*/; do
            name=$(basename "$app")
            echo "=========================================="
            echo "Building $name"
            echo "=========================================="
            (cd "$app" && npm ci && npm run build)
          done

      # Assemble final site: landing page assets + registry + houses + each app's dist
      - name: Assemble site
        run: |
          set -e
          mkdir -p _site
          cp index.html style.css script.js _site/
          [ -f registry.json ] && cp registry.json _site/ || true
          [ -d houses ] && cp -r houses _site/houses || true
          for app in apps/*/; do
            name=$(basename "$app")
            mkdir -p "_site/$name"
            cp -r "$app/dist/." "_site/$name/"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
