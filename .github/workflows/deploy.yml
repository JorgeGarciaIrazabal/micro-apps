name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build clara-egg-hunt
      - name: Install & build clara-egg-hunt
        working-directory: apps/clara-egg-hunt
        run: |
          npm ci
          npm run build

      # Build clara-summer-camps
      - name: Install & build clara-summer-camps
        working-directory: apps/clara-summer-camps
        run: |
          npm ci
          npm run build

      # Assemble final site
      - name: Assemble site
        run: |
          mkdir -p _site/clara-egg-hunt
          mkdir -p _site/clara-summer-camps
          cp index.html _site/
          cp -r apps/clara-egg-hunt/dist/* _site/clara-egg-hunt/
          cp -r apps/clara-summer-camps/dist/* _site/clara-summer-camps/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
