name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build clara-egg-hunt
      - name: Install & build clara-egg-hunt
        working-directory: apps/clara-egg-hunt
        run: |
          npm ci
          npm run build

      # Build clara-summer-camps
      - name: Install & build clara-summer-camps
        working-directory: apps/clara-summer-camps
        run: |
          npm ci
          npm run build

      # Build clara-summer-camps-madrid
      - name: Install & build clara-summer-camps-madrid
        working-directory: apps/clara-summer-camps-madrid
        run: |
          npm ci
          npm run build

      # Build andalucia-scouting-2026
      - name: Install & build andalucia-scouting-2026
        working-directory: apps/andalucia-scouting-2026
        run: |
          npm ci
          npm run build

      # Build casa-prefab-madrid
      - name: Install & build casa-prefab-madrid
        working-directory: apps/casa-prefab-madrid
        run: |
          npm ci
          npm run build
      # Build house-designer
      - name: Install & build house-designer
        working-directory: apps/house-designer
        run: |
          npm ci
          npm run build


      # Assemble final site
      - name: Assemble site
        run: |
          mkdir -p _site/clara-egg-hunt
          mkdir -p _site/clara-summer-camps
          mkdir -p _site/clara-summer-camps-madrid
          mkdir -p _site/andalucia-scouting-2026
          mkdir -p _site/casa-prefab-madrid
          mkdir -p _site/house-designer
          cp index.html _site/
          cp -r apps/clara-egg-hunt/dist/* _site/clara-egg-hunt/
          cp -r apps/clara-summer-camps/dist/* _site/clara-summer-camps/
          cp -r apps/clara-summer-camps-madrid/dist/* _site/clara-summer-camps-madrid/
          cp -r apps/andalucia-scouting-2026/dist/* _site/andalucia-scouting-2026/
          cp -r apps/casa-prefab-madrid/dist/* _site/casa-prefab-madrid/
          cp -r apps/house-designer/dist/* _site/house-designer/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
